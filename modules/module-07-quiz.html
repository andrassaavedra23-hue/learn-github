<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Módulo 7: Quiz Final</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.0/index.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5.0.0/index.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #0d1117; --bg-2: #161b22; --bg-3: #21262d; --border: #30363d; --text: #e6edf3; --text-dim: #8b949e; --green: #3fb950; --blue: #58a6ff; --purple: #bc8cff; --orange: #f0883e; --red: #f85149; --yellow: #d29922; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
nav { background: var(--bg-2); border-bottom: 1px solid var(--border); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
.nav-left { display: flex; align-items: center; gap: 20px; }
.btn-back { background: var(--bg-3); color: var(--text); border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-family: inherit; }
.xp-badge { background: linear-gradient(135deg, var(--purple), var(--blue)); padding: 6px 14px; border-radius: 20px; font-weight: 600; font-size: 0.85em; }
.container { max-width: 900px; margin: 0 auto; padding: 40px; }
.lesson { background: var(--bg-2); border: 1px solid var(--border); border-radius: 16px; padding: 35px; }
.lesson-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.lesson-emoji { font-size: 2.5em; background: var(--bg-3); width: 70px; height: 70px; border-radius: 16px; display: flex; align-items: center; justify-content: center; }
.quiz-question { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 20px; }
.quiz-question-text { font-size: 1.1em; font-weight: 600; margin-bottom: 15px; display: flex; gap: 10px; }
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-option { background: var(--bg-2); border: 2px solid var(--border); padding: 12px 18px; border-radius: 8px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
.quiz-option:hover { border-color: var(--blue); }
.quiz-option.correct { border-color: var(--green); background: rgba(63,185,80,0.1); }
.quiz-option.wrong { border-color: var(--red); background: rgba(248,81,73,0.1); }
.quiz-option-letter { width: 28px; height: 28px; border-radius: 50%; background: var(--bg-3); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.85em; flex-shrink: 0; }
.quiz-feedback { margin-top: 15px; padding: 12px; border-radius: 8px; font-size: 0.9em; display: none; }
.quiz-feedback.show { display: block; }
.quiz-feedback.correct { background: rgba(63,185,80,0.1); border-left: 3px solid var(--green); }
.quiz-feedback.wrong { background: rgba(248,81,73,0.1); border-left: 3px solid var(--red); }
.result-card { background: linear-gradient(135deg, rgba(63,185,80,0.1), rgba(88,166,255,0.1)); border: 2px solid var(--green); border-radius: 16px; padding: 40px; text-align: center; margin-top: 30px; display: none; }
.result-card.show { display: block; animation: fadeIn 0.5s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.result-icon { font-size: 4em; margin-bottom: 15px; }
.result-score { font-size: 2.5em; font-weight: 700; margin-bottom: 10px; background: linear-gradient(90deg, var(--green), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.result-msg { color: var(--text-dim); margin-bottom: 20px; font-size: 1.1em; }
.result-xp { font-size: 1.3em; margin-bottom: 25px; }
.nav-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 30px; flex-wrap: wrap; }
.btn { background: var(--bg-3); color: var(--text); border: 1px solid var(--border); padding: 12px 24px; border-radius: 10px; cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.2s; }
.btn:hover { background: var(--border); transform: translateY(-2px); }
.btn-primary { background: linear-gradient(135deg, var(--green), #2ea043); border-color: var(--green); color: white; }
.notification { position: fixed; top: 100px; right: 30px; background: var(--bg-2); border: 1px solid var(--green); border-left: 4px solid var(--green); padding: 15px 20px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); transform: translateX(400px); transition: transform 0.4s; z-index: 1000; }
.notification.show { transform: translateX(0); }
</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <button class="btn-back" onclick="window.location.href='../dashboard.html'">← Volver</button>
    <strong>Módulo 7 - Final</strong>
  </div>
  <div class="xp-badge">⭐ <span id="xpCount">0</span> XP</div>
</nav>

<div class="container">
  <div class="lesson">
    <div class="lesson-header">
      <div class="lesson-emoji"></div>
      <div>
        <div style="font-size: 1.8em; font-weight: 700;">Quiz Final</div>
        <div style="color: var(--text-dim);">Demuestra lo que aprendiste</div>
      </div>
    </div>

    <div id="quizContainer"></div>

    <div class="result-card" id="resultCard">
      <div class="result-icon" id="resultIcon">🏆</div>
      <div class="result-score" id="resultScore">0/5</div>
      <div class="result-msg" id="resultMsg">¡Buen trabajo!</div>
      <div class="result-xp">XP Total: <strong id="resultXP">0</strong> ⭐</div>
      <div class="nav-buttons">
        <button class="btn" onclick="window.location.href='../dashboard.html'">📊 Ver Dashboard</button>
        <button class="btn btn-primary" onclick="window.open('https://github.com/andrassaavedra23-hue/learn-github', '_blank')">🚀 Mi Repositorio</button>
      </div>
    </div>
  </div>
</div>

<div class="notification" id="notification"><span id="notifText"></span></div>

<script>
const MODULE_ID = 'quiz';
let xp = 0, answers = {};

const QUESTIONS = [
  { q: '¿Qué comando ves el estado de tus archivos?', options: ['git status', 'git log', 'git diff', 'git show'], correct: 0 },
  { q: '¿Qué hace "git add ."?', options: ['Sube a GitHub', 'Agrega todos los cambios al staging', 'Crea un commit', 'Crea un branch'], correct: 1 },
  { q: '¿Cuál es el branch principal por defecto?', options: ['master', 'main', 'develop', 'trunk'], correct: 1 },
  { q: '¿Qué comando sube cambios a GitHub?', options: ['git pull', 'git push', 'git upload', 'git send'], correct: 1 },
  { q: '¿Qué es un Pull Request?', options: ['Bajar código de GitHub', 'Eliminar un branch', 'Propuesta para unir un branch a main', 'Un tipo de commit'], correct: 2 }
];

function renderQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = QUESTIONS.map((q, i) => `
    <div class="quiz-question" id="question${i}">
      <div class="quiz-question-text">${i + 1}. <span>${q.q}</span></div>
      <div class="quiz-options">
        ${q.options.map((opt, j) => `
          <div class="quiz-option" onclick="answerQuestion(${i}, ${j})">
            <div class="quiz-option-letter">${String.fromCharCode(65 + j)}</div>
            <div>${opt}</div>
          </div>
        `).join('')}
      </div>
      <div class="quiz-feedback" id="feedback${i}"></div>
    </div>
  `).join('');
}

function answerQuestion(qi, oi) {
  if (answers[qi] !== undefined) return;
  answers[qi] = oi;
  
  const q = QUESTIONS[qi];
  const correct = oi === q.correct;
  const question = document.getElementById(`question${qi}`);
  const options = question.querySelectorAll('.quiz-option');
  options.forEach(o => o.style.pointerEvents = 'none');
  options[oi].classList.add(correct ? 'correct' : 'wrong');
  
  if (!correct) options[q.correct].classList.add('correct');
  
  const fb = document.getElementById(`feedback${qi}`);
  fb.className = `quiz-feedback show ${correct ? 'correct' : 'wrong'}`;
  fb.innerHTML = correct ? '✅ ¡Correcto! +20 XP' : '❌ Incorrecto. La respuesta correcta está marcada en verde.';
  
  if (correct) { xp += 20; document.getElementById('xpCount').textContent = xp; }
  
  if (Object.keys(answers).length === QUESTIONS.length) {
    setTimeout(showResult, 1000);
  }
}

function showResult() {
  const correct = Object.entries(answers).filter(([qi, oi]) => oi === QUESTIONS[qi].correct).length;
  const total = QUESTIONS.length;
  const pct = Math.round((correct / total) * 100);
  
  let icon, msg;
  if (pct === 100) { icon = '🏆'; msg = '¡Perfecto! Dominas los fundamentos de Git'; }
  else if (pct >= 80) { icon = '🌟'; msg = '¡Excelente! Casi perfecto'; }
  else if (pct >= 60) { icon = '👍'; msg = '¡Bien! Sigue practicando'; }
  else { icon = '📚'; msg = 'Repasa los módulos anteriores'; }
  
  const bonusXP = pct === 100 ? 100 : pct >= 80 ? 50 : 0;
  xp += bonusXP;
  
  document.getElementById('resultIcon').textContent = icon;
  document.getElementById('resultScore').textContent = `${correct}/${total} correctas (${pct}%)`;
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultXP').textContent = xp;
  document.getElementById('resultCard').classList.add('show');
  
  // Save progress
  const users = JSON.parse(localStorage.getItem('learngithub_users') || '{}');
  const session = JSON.parse(localStorage.getItem('learngithub_session'));
  if (session && users[session.email]) {
    users[session.email].xp = (users[session.email].xp || 0) + xp;
    if (!users[session.email].completedModules) users[session.email].completedModules = [];
    if (!users[session.email].completedModules.includes(MODULE_ID)) users[session.email].completedModules.push(MODULE_ID);
    users[session.email].lastModule = MODULE_ID;
    localStorage.setItem('learngithub_users', JSON.stringify(users));
  }
  
  if (bonusXP > 0) showNotification(`+${bonusXP} XP bonus por ${pct >= 100 ? 'perfecto' : 'buen resultado'}`);
  
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
}

function showNotification(text) {
  const n = document.getElementById('notification');
  document.getElementById('notifText').textContent = text;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 2500);
}

const session = JSON.parse(localStorage.getItem('learngithub_session'));
if (session) {
  const users = JSON.parse(localStorage.getItem('learngithub_users') || '{}');
  if (users[session.email]) document.getElementById('xpCount').textContent = users[session.email].xp || 0;
}
renderQuiz();
</script>
</body>
</html><!-- TODO: contenido -->
